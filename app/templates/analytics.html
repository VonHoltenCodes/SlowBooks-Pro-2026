<!--
  Slowbooks Pro 2026 — Analytics Dashboard page
  Standalone page (not part of the main SPA). Served by GET /analytics.
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slowbooks Analytics</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #1e1e2a;
            --panel-border: #2a2a3a;
            --text: #e6e6f0;
            --muted: #a0a0b8;
            --green: #00d4aa;
            --red: #ff4757;
            --blue: #5b7fff;
            --purple: #a855f7;
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 24px;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--panel-border);
        }

        header h1 {
            margin: 0;
            color: var(--green);
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        header a {
            color: var(--muted);
            text-decoration: none;
            font-size: 13px;
        }

        header a:hover { color: var(--text); }

        h2 {
            margin: 32px 0 12px;
            font-size: 14px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        @media (max-width: 800px) {
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .kpi-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 18px;
            border-radius: 8px;
        }

        .kpi-label {
            color: var(--muted);
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .kpi-value {
            font-size: 26px;
            font-weight: 700;
            line-height: 1;
        }

        .kpi-green  { color: var(--green); }
        .kpi-red    { color: var(--red); }
        .kpi-blue   { color: var(--blue); }
        .kpi-purple { color: var(--purple); }

        .analytics-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            overflow: hidden;
        }

        .analytics-table th,
        .analytics-table td {
            padding: 10px 14px;
            text-align: left;
            border-bottom: 1px solid var(--panel-border);
            font-size: 13px;
        }

        .analytics-table thead th {
            background: #17171f;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .analytics-table tbody tr:last-child td { border-bottom: none; }
        .analytics-table .num { text-align: right; font-variant-numeric: tabular-nums; }
        .analytics-table .green { color: var(--green); }
        .analytics-table .red   { color: var(--red); }

        .empty {
            padding: 16px;
            color: var(--muted);
            font-size: 13px;
            background: var(--panel);
            border: 1px dashed var(--panel-border);
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="analytics-root">
        <header>
            <h1>Slowbooks Analytics</h1>
            <a href="/">← Back to Slowbooks</a>
        </header>

        <h2>Key Metrics</h2>
        <div id="kpis"></div>

        <h2>Revenue by Customer (MTD)</h2>
        <div id="revenue-table"></div>

        <h2>Accounts Receivable Aging</h2>
        <div id="ar-aging"></div>
    </div>

    <script src="/static/js/AnalyticsDashboard.js"></script>
</body>
</html>
